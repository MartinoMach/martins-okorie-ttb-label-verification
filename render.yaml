services:
  - type: web
    name: ttb-label-verification-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: OPENAI_API_KEY
        sync: false
      - key: VISION_MODEL
        value: gpt-4.1-mini
      - key: FRONTEND_ORIGINS
        value: https://ttb-label-verification-frontend-mach-tino.vercel.app
      - key: MAX_IMAGE_BYTES
        value: "8388608"
      - key: VISION_TIMEOUT_SECONDS
        value: "4.5"
      - key: BATCH_CONCURRENCY
        value: "3"
      - key: BATCH_MAX_ITEMS
        value: "10"
