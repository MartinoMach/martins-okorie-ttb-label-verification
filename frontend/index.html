<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TTB Label Verification</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">TTB Label Verification</p>
        <h1>Check one label.</h1>
      </div>
      <div class="api-status" id="healthStatus" role="status">Checking API...</div>
    </header>

    <main class="workspace">
      <form id="singleForm" class="input-panel" aria-describedby="singleError">
        <div class="section-heading">
          <h2>Application data</h2>
          <p>Enter the approved values and choose the label image.</p>
        </div>

        <label class="file-picker">
          <span>Label image</span>
          <input id="image" name="image" type="file" accept="image/png,image/jpeg,image/webp" required />
        </label>

        <div class="fields">
          <label>Brand name<input name="brand_name" autocomplete="off" required /></label>
          <label>Class or type<input name="class_type" autocomplete="off" required /></label>
          <label>Alcohol content<input name="abv" autocomplete="off" placeholder="45%" required /></label>
          <label>Net contents<input name="net_contents" autocomplete="off" placeholder="750 mL" required /></label>
          <label>Producer<input name="producer" autocomplete="off" required /></label>
          <label>Country of origin<input name="country_of_origin" autocomplete="off" required /></label>
          <label class="wide">
            Government warning
            <textarea name="government_warning" rows="5" required></textarea>
          </label>
        </div>

        <p class="form-error" id="singleError" role="alert"></p>
        <button class="primary" type="submit">Verify label</button>
      </form>

      <section class="result-panel" aria-live="polite">
        <div class="section-heading">
          <h2>Result</h2>
          <p id="singleLatency">No check has run yet.</p>
        </div>
        <div id="singleVerdict" class="verdict neutral">Waiting</div>
        <div id="singleResults" class="result-list"></div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
